<div class="transfer-container">
  <div class="page-header">
    <h1><i class="fas fa-paper-plane"></i> Transfert d'argent</h1>
    <button class="btn-secondary" (click)="cancel()"><i class="fas fa-arrow-left"></i> Retour</button>
  </div>

  <div class="form-card">
    <div class="balance-info" *ngIf="balanceStore.balance() > 0">
      <span class="balance-label"><i class="fas fa-wallet"></i> Solde disponible</span>
      <span class="balance-value">{{ balanceStore.balance() | xof }}</span>
    </div>

    <form [formGroup]="transferForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label><i class="fas fa-user"></i> Expéditeur *</label>
        <input 
          id="senderPhone"
          type="text" 
          formControlName="senderPhone"
          class="form-control"
          [class.invalid]="transferForm.get('senderPhone')?.invalid && transferForm.get('senderPhone')?.touched"
          placeholder="+221 77 000 00 01"
        >
        <div class="error-message" *ngIf="transferForm.get('senderPhone')?.invalid && transferForm.get('senderPhone')?.touched">
          <i class="fas fa-exclamation-circle"></i> {{ getErrorMessage('senderPhone') }}
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-user"></i> Destinataire *</label>
        <input 
          id="receiverPhone"
          type="text" 
          formControlName="receiverPhone"
          class="form-control"
          [class.invalid]="transferForm.get('receiverPhone')?.invalid && transferForm.get('receiverPhone')?.touched"
          placeholder="+221 77 000 00 02"
        >
        <div class="error-message" *ngIf="transferForm.get('receiverPhone')?.invalid && transferForm.get('receiverPhone')?.touched">
          <i class="fas fa-exclamation-circle"></i> {{ getErrorMessage('receiverPhone') }}
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-money-bill-wave"></i> Montant à transférer *</label>
        <div class="input-group">
          <input 
            id="amount"
            type="number" 
            formControlName="amount"
            class="form-control"
            [class.invalid]="transferForm.get('amount')?.invalid && transferForm.get('amount')?.touched"
            placeholder="0"
            min="1"
            step="100"
          >
          <span class="input-suffix">XOF</span>
        </div>
        <div class="error-message" *ngIf="transferForm.get('amount')?.invalid && transferForm.get('amount')?.touched">
          <i class="fas fa-exclamation-circle"></i> {{ getErrorMessage('amount') }}
        </div>
      </div>

      <div class="form-error" *ngIf="getFormError()">
        <i class="fas fa-exclamation-triangle"></i> {{ getFormError() }}
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="cancel()">
          <i class="fas fa-times"></i> Annuler
        </button>
        <button type="submit" class="btn-primary" [disabled]="transferForm.invalid || isSubmitting">
          <i class="fas" [class.fa-spinner]="isSubmitting" [class.fa-spin]="isSubmitting" [class.fa-paper-plane]="!isSubmitting"></i>
          {{ isSubmitting ? 'Transfert en cours...' : 'Transférer' }}
        </button>
      </div>
    </form>
  </div>
</div>
